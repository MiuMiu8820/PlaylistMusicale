<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Manager</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="playlist.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Libreria</h2>

        <button data-action="add">Aggiungi brano</button>
        <button data-action="play">Riproduci</button>
        <button data-action="duration">Durata totale</button>
        <button data-action="clear">Svuota playlist</button>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <header>
            <h1>Playlist Manager</h1>
            <div class="stats">
                <span id="playlist-count">0</span> brani
            </div>
        </header>

        <!-- FORM -->
        <form id="add-form" class="form hidden">
            <h2>Aggiungi brano</h2>

            <div class="form-group">
                <label>Titolo</label>
                <input type="text" id="title-input" required>
            </div>

            <div class="form-group">
                <label>Artista</label>
                <input type="text" id="artist-input" required>
            </div>

            <div class="form-group">
                <label>Durata (secondi)</label>
                <input type="number" id="duration-input" required>
            </div>

            <div class="form-actions">
                <button type="submit">Salva</button>
                <button type="button" id="cancel">Annulla</button>
            </div>
        </form>

        <!-- LISTA -->
        <div id="playlist" class="playlist">
            <div class="empty">Nessun brano nella playlist</div>
        </div>

        <!-- INFO -->
        <div id="total-duration" class="info hidden"></div>

    </main>

</div>

<!-- JS -->
<script src="playlist.js"></script>

</body>
</html>
