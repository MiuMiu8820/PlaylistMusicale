<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Manager</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="playlist.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Libreria</h2>

        <button data-action="add">Aggiungi brano</button>
        <button data-action="remove">Rimuovi brano</button>
        <button data-action="play">Riproduci</button>
        <button data-action="toggle-fav">Preferiti</button>
        <button data-action="show-favs">Solo preferiti</button>
        <button data-action="duration">Durata totale</button>
        <button data-action="move">Sposta brano</button>
        <button data-action="clear">Svuota playlist</button>
    </aside>
